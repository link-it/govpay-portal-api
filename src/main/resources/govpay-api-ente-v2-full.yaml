openapi: 3.0.0
info:
  description: >-
   API di integrazione a GovPay esposte dagli applicativi gestori delle Posizioni Debitorie dell'Ente Creditore per:
    - Notificare i pagamenti effettuati sulla piattaforma pagoPA
    - Verificare i dati delle pendenze oggetto di pagamento

   ## Notifica Pagamenti
    La piattaforma GovPay prevede l'invio di una notifica alla conclusione con successo di una transazione di pagamento pagoPA, ovvero a fronte dell'acquisizione di una RT, indipendentemente dalla modalità di pagamento o dall'esito.

   ## Verifica Pendenze
    In sede di pagamento, la piattaforma GovPay potrebbe aver necessità di richiedere all'applicativo gestore i dati aggiornati della pendenza oggetto del pagamento. Questo può accadere in due scenari:
    - La pendenza associata al pagamento non è disponibile in GovPay
    - La data di validità presente nella pendenza oggetto del pagamento è decorsa.

    Le informazioni restituite dal servizio vanno ad aggiornare la pendenza negli archivi di GovPay ed utilizzate per perfezionare il pagamento.
  version: "2.0.0"
  title: "GovPay - API Notifica e Verifica"
  contact:
    name: GitHub Project Page
    url: 'https://github.com/link-it/GovPay/'
  license:
    name: GPL
    url: 'https://github.com/link-it/GovPay/blob/master/LICENSE'
servers:
  - description: Base url servizio
    url: https://host/baseurl
tags:
  - name: Verifica pendenze
  - name: Notifica ricevute
paths:
  '/avvisi/{idDominio}/{numeroAvviso}':
    get:
      operationId: getAvviso
      summary: Verifica di una pendenza da avviso
      tags:
        - Verifica pendenze
      parameters:
        - $ref: '#/components/parameters/PathIdDominio'
        - $ref: '#/components/parameters/PathNumeroAvviso'
      responses:
        '200':
          description: Pendenza
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendenzaVerificata'
              examples:
                'Pendenza non eseguita':
                  $ref: '#/components/examples/PendenzaVerificata'
                'Pendenza annullata':
                  value:
                    stato: 'ANNULLATA'
                    descrizioneStato: 'Pendenza annullata'
                'Pendenza scaduta':
                  value:
                    stato: 'SCADUTA'
                    descrizioneStato: 'Pendenza scaduta'
                'Pendenza sconosciuta':
                  value:
                    stato: 'SCONOSCIUTA'
                    descrizioneStato: 'Pendenza sconosciuta'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401NotAuthenticated'
        '403':
          $ref: '#/components/responses/403NotAuthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500ServiceUnavailable'
  '/pendenze/{idA2A}/{idPendenza}':
    get:
      operationId: verifyPendenza
      summary: Verifica di una pendenza da identificativo
      tags:
        - Verifica pendenze
      parameters:
        - $ref: '#/components/parameters/PathIdA2A'
        - $ref: '#/components/parameters/PathIdPendenza'
      responses:
        '200':
          description: Pendenza
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendenzaVerificata'
              examples:
                'Pendenza non eseguita':
                  $ref: '#/components/examples/PendenzaVerificata'
                'Pendenza annullata':
                  value:
                    stato: 'ANNULLATA'
                    descrizioneStato: 'Pendenza annullata'
                'Pendenza scaduta':
                  value:
                    stato: 'SCADUTA'
                    descrizioneStato: 'Pendenza scaduta'
                'Pendenza sconosciuta':
                  value:
                    stato: 'SCONOSCIUTA'
                    descrizioneStato: 'Pendenza sconosciuta'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401NotAuthenticated'
        '403':
          $ref: '#/components/responses/403NotAuthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500ServiceUnavailable'
  '/pendenze/{idDominio}/{idTipoPendenza}':
    post:
      operationId: verifyPendenzaMod4
      summary: Acquisizione di una pendenza con dati custom
      tags:
        - Verifica pendenze
      parameters:
        - $ref: '#/components/parameters/PathIdDominio'
        - $ref: '#/components/parameters/PathIdTipoPendenza'
      requestBody:
        description: Pendenza nel formato custom
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Pendenza
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendenzaVerificata'
              examples:
                'Pendenza non eseguita':
                  $ref: '#/components/examples/PendenzaVerificata'
                'Pendenza annullata':
                  value:
                    stato: 'ANNULLATA'
                    descrizioneStato: 'Pendenza annullata'
                'Pendenza scaduta':
                  value:
                    stato: 'SCADUTA'
                    descrizioneStato: 'Pendenza scaduta'
                'Pendenza sconosciuta':
                  value:
                    stato: 'SCONOSCIUTA'
                    descrizioneStato: 'Pendenza sconosciuta'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401NotAuthenticated'
        '403':
          $ref: '#/components/responses/403NotAuthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500ServiceUnavailable'
  '/ricevute/{idDominio}/{iuv}/{idRicevuta}':
    put:
      operationId: notificaRicevuta
      summary: Notifica di una ricevuta di avvenuto pagamento pagoPA
      description: >-
        La notifica di un pagamento corrisponde ad una ricevuta pagoPA, sia questa veicolata nella forma di `RT` o di `recepit`, di esito positivo.
        Le notifiche sono inviate contestualmente all'evento che le genera. In caso di errori di consegna (ovvero senza risposta HTTP 2xx), le notifiche sono rispedite in tempi successivi. Se la ricevuta risulta gia' stata acquisita, puo' essere ignorata ed esitata con successo per interromperne la rispedizione.
      tags:
        - Notifica ricevute
      parameters:
        - $ref: '#/components/parameters/PathIdDominio'
        - $ref: '#/components/parameters/PathIuv'
        - $ref: '#/components/parameters/PathIdRicevuta'
        - $ref: '#/components/parameters/QueryIdSession'
        - $ref: '#/components/parameters/QueryIdSessionePortale'
        - $ref: '#/components/parameters/QueryIdCarrello'
      requestBody:
        description: Notifica di una ricevuta di pagamento
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Ricevuta'
            examples:
              standard:
                $ref: '#/components/examples/RicevutaEntrata'
      responses:
        '201':
          description: ricevuta di pagamento acquisita
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401NotAuthenticated'
        '403':
          $ref: '#/components/responses/403NotAuthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500ServiceUnavailable'
components:
  parameters:
    PathNumeroAvviso:
      name: numeroAvviso
      in: path
      description: "Numero identificativo dell'avviso pagoPA"
      required: true
      schema:
        $ref: '#/components/schemas/NumeroAvviso'
    PathIdA2A:
      name: idA2A
      in: path
      description: Identificativo del gestionale ente
      required: true
      schema:
        $ref: '#/components/schemas/IdA2A'
    PathIdDominio:
      name: idDominio
      in: path
      description: "Identificativo dell'Ente Creditore in pagoPA. Corrisponde al codice fiscale."
      required: true
      schema:
        $ref: '#/components/schemas/IdDominio'
    PathIdPendenza:
      name: idPendenza
      in: path
      description: Identificativo della pendenza nel gestionale ente
      required: true
      schema:
        $ref: '#/components/schemas/IdPendenza'
    PathIdRicevuta:
      name: idRicevuta
      in: path
      description: Identificativo della ricevuta di pagamento. Corrisponde al `receiptId` oppure al `ccp` a seconda del modello di pagamento utilizzato
      required: true
      schema:
        $ref: '#/components/schemas/IdRicevuta'
    PathIdTipoPendenza:
      name: idTipoPendenza
      in: path
      description: Identificativo della tipologia di pendenza
      required: true
      schema:
        $ref: '#/components/schemas/IdTipoPendenza'
    PathIuv:
      name: iuv
      in: path
      description: Identificativo univoco di versamento
      required: true
      schema:
        $ref: '#/components/schemas/Iuv'
    QueryIdSession:
      name: idSession
      in: query
      description: "Identificativo della sessione di pagamento in pagoPA"
      required: false
      schema:
        type: string
    QueryIdSessionePortale:
      name: idSessionePortale
      in: query
      description: "Identificativo della sessione di pagamento per il portale richiedente"
      required: false
      schema:
        type: string
    QueryIdCarrello:
      name: idCarrello
      in: query
      description: "Identificativo del carrello di pagamento"
      required: false
      schema:
        type: string
    ccp:
      name: ccp
      in: query
      description: Codice contesto pagamento
      required: false
      schema:
        type: string
        pattern: '(^([0-9A-Za-z]){1,35}$)'
    dataDa:
      name: dataDa
      in: query
      description: Inizio della finestra temporale di osservazione
      required: false
      schema:
        type: string
        format: date-time
    dataA:
      name: dataA
      in: query
      description: Fine della finestra temporale di osservazione
      required: false
      schema:
        type: string
        format: date-time
    direzione:
      name: direzione
      in: query
      description: Identificativo della direzione interna all'ente creditore
      required: false
      schema:
        type: string
        example: Direzione ABC
        pattern: '(^([0-9A-Za-z]){1,35}$)'
    divisione:
      name: divisione
      in: query
      description: Identificativo della divisione interna all'ente creditore
      required: false
      schema:
        type: string
        example: Divisione001
        pattern: '(^([0-9A-Za-z]){1,35}$)'
    campi:
      name: campi
      in: query
      description: Fields to retrieve
      required: false
      schema:
        type: string
    idA2A:
      name: idA2A
      in: query
      description: Identificativo del gestionale ente
      required: false
      schema:
        $ref: '#/components/schemas/IdA2A'
    idDominio:
      name: idDominio
      in: query
      description: "Identificativo dell'Ente Creditore in pagoPA. Corrisponde al codice fiscale."
      required: false
      schema:
        $ref: '#/components/schemas/IdDominio'
    idFlusso:
      in: query
      name: idFlusso
      description: Identificativo flusso
      required: false
      schema:
        type: string
    idFlussoCaseInsensitive:
      in: query
      name: idFlussoCaseInsensitive
      description: "Indica se effettuare la ricerca per Identificativo flusso in modalita' case insensitive"
      required: false
      schema:
        type: boolean
    idPendenza:
      name: idPendenza
      in: query
      description: Identificativo della pendenza nel gestionale ente
      required: false
      schema:
        $ref: '#/components/schemas/IdPendenza'
    idPagamento:
      name: idPagamento
      in: query
      description: Identificativo della richiesta di pagamento
      required: false
      schema:
        type: string
        pattern: '(^([0-9A-Za-z]){1,35}$)'
      example: 'c8be909b-2feb-4ffa-8f98-704462abbd1d'
    idRicevuta:
      name: iuv
      in: query
      description: Identificativo del versamento
      required: false
      schema:
        type: string
        pattern: '(^([0-9A-Za-z]){1,35}$)'
    iur:
      name: iur
      in: query
      description: Identificativo univoco riscossione
      required: false
      schema:
        type: string
        pattern: '(^([0-9A-Za-z]){1,35}$)'
    iuv:
      name: iuv
      in: query
      description: Identificativo del versamento
      required: false
      schema:
        type: string
        pattern: '(^([0-9A-Za-z]){1,35}$)'
    maxRisultati:
      name: maxRisultati
      in: query
      description: >-
            Indica se il servizio deve impostare o meno il limite sul calcolo del numero di risultati
      required: false
      schema:
        type: boolean
        default: true
      example: true
    metadatiPaginazione:
      name: metadatiPaginazione
      in: query
      description: >-
              Indica se il servizio calcola e valorizza i dati di paginazione o meno
      required: false
      schema:
        type: boolean
        default: true
      example: true

    ordinamento:
      name: ordinamento
      in: query
      description: Sorting order
      required: false
      schema:
        type: string
    pagina:
      name: pagina
      in: query
      description: Numero di pagina di risultato
      required: false
      schema:
        $ref: '#/components/schemas/Pagina'
    risultatiPerPagina:
      name: risultatiPerPagina
      in: query
      description: How many items to return at one time
      required: false
      schema:
        type: integer
        default: 25
        maximum: 200
    statoFlussoRendicontazione:
      name: stato
      in: query
      description: Stato del flusso di rendicontazione
      required: false
      schema:
        $ref: '#/components/schemas/StatoFlussoRendicontazione'
    statoRiscossione:
      name: stato
      in: query
      description: Stato della riscossione
      required: false
      schema:
        $ref: '#/components/schemas/StatoRiscossione'
    tipiRiscossione:
      in: query
      name: tipo
      description: Tipologia della riscossione (default [ENTRATA, MBT] )
      required: false
      schema:
        type: array
        items:
          $ref: '#/components/schemas/TipoRiscossione'
    tipoRiscossione:
      name: tipoRiscossione
      in: query
      description: Tipo di riscossione
      required: false
      schema:
        $ref: '#/components/schemas/TipoRiscossione'
    sct:
      name: sct
      in: query
      description: Identificativo del Sepa Credit Transfert di riversamento da PSP a conto di accredito
      required: false
      schema:
        type: string
  responses:
    '202Accepted':
      description: Richiesta accettata
      headers:
        Location:
          description: Path della risorsa
          schema:
            type: string
    '400BadRequest':
      description: Richiesta non correttamente formata
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FaultBean'
          example:
            categoria: RICHIESTA
            codice: 00001
            descrizione: Messaggio di richiesta non valido
            dettaglio: Codice Avviso non conforme alle specifiche pagoPA
    '401NotAuthenticated':
      description: Richiesta non autenticata
    '403NotAuthorized':
      description: Richiesta non autorizzata
    '404NotFound':
      description: Risorsa inesistente
    '500ServiceUnavailable':
      description: Servizio non disponibile
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FaultBean'
          example:
            categoria: INTERNO
            codice: INTERNO
            descrizione: Servizio non disponibile
  schemas:
    FaultBean:
      type: object
      required:
        - categoria
        - codice
        - descrizione
      properties:
        categoria:
          type: string
          description: >-
            Categoria dell'errore riscontrato:
             * `AUTORIZZAZIONE` - Operazione non autorizzata
             * `RICHIESTA` - Richiesta non valida
             * `OPERAZIONE` - Operazione non eseguibile
             * `PAGOPA` - Errore da PagoPA
             * `EC` - Errore da Ente Creditore
             * `INTERNO` - Errore interno
          enum:
            - AUTORIZZAZIONE
            - RICHIESTA
            - OPERAZIONE
            - PAGOPA
            - EC
            - INTERNO
        codice:
          type: string
          description: Codice di errore
        descrizione:
          type: string
          description: Descrizione dell'errore
        dettaglio:
          type: string
          description: Descrizione aggiuntiva
      example:
        categoria: INTERNO
        codice: INTERNO
        descrizione: Servizio non disponibile
    PendenzaVerificata:
      description: >-
        Il campo 'pendenza' e' obbligatorio quando il valore del campo 'stato' e' uguale a 'NON_ESEGUITA'. Valorizzare il campo 'descrizioneStato' con una descrizione estesa dello stato della pendenza quando il valore del campo 'stato' e' diverso da 'NON_ESEGUITA'.
      type: object
      required:
        - stato
      properties:
        stato:
          $ref: '#/components/schemas/StatoPendenzaVerificata'
        descrizioneStato:
          type: string
          description: Descrizione in dettaglio dello stato della pendenza.
          maxLength: 255
        pendenza:
          $ref: '#/components/schemas/NuovaPendenza'
    StatoPendenzaVerificata:
      example: NON_ESEGUITA
      type: string
      enum:
        - NON_ESEGUITA
        - ANNULLATA
        - SCADUTA
        - SCONOSCIUTA
    Allegato:
      type: object
      required:
        - tipo
        - testo
      properties:
        tipo:
          description: Tipologia di allegato
          type: string
          enum:
            - Esito pagamento
            - Marca da bollo
        testo:
          description: allegato codificato in base64
          type: string
    AllegatoPendenza:
      type: object
      required:
        - nome
        - contenuto
      properties:
        nome:
          type: string
          description: nome del file
          minLength: 1
          maxLength: 255
        tipo:
          type: string
          description: mime type del file
          default: "application/octet-stream"
          minLength: 1
          maxLength: 255
        descrizione:
          type: string
          description: descrizione del file
          minLength: 1
          maxLength: 255
        contenuto:
          type: string
          description: path per accedere al file, nella forma /allegati/{id}
    Bollo:
      description: Definisce i dati di un bollo telematico
      type: object
      required:
        - tipoBollo
        - hashDocumento
        - provinciaResidenza
        - codiceTassonomicoPagoPA
      properties:
        tipoBollo:
          description: Tipologia di Bollo digitale
          type: string
          enum:
            - '01'
        hashDocumento:
          description: Digest in base64 del documento informatico associato alla marca da bollo
          type: string
          example: "--- base64 ---"
          maxLength: 70
        provinciaResidenza:
          description: Sigla automobilistica della provincia di residenza del soggetto pagatore
          type: string
          example: "RO"
          pattern: "[A-Z]{2,2}"
        codiceTassonomicoPagoPA:
          description: Tassonomia pagoPA
          type: string
          example: "9/3321"
          minLength: 1
          maxLength: 140
    Contabilita:
      type: object
      properties:
        quote:
          type: array
          items:
            $ref: '#/components/schemas/QuotaContabilita'
        proprietaCustom:
          type: object
          description: Dati specifici del gestionale di contabilità
    Documento:
      allOf:
        - $ref: "#/components/schemas/TipoRiferimentoDocumento"
        - type: object
          required:
            - identificativo
            - descrizione
          properties:
            identificativo:
              type: string
              description: Identificativo del documento
              example: abcdef12345_1
              minLength: 1
              maxLength: 35
            descrizione:
              type: string
              description: descrizione del documento
              example: Sanzione CdS n. abc00000
              minLength: 1
              maxLength: 80
    Dominio:
      type: object
      required:
        - idDominio
      properties:
        idDominio:
          $ref: "#/components/schemas/IdDominio"
        ragioneSociale:
          type: string
          description: Ragione sociale
          example: "Comune Dimostrativo"
          minLength: 1
          maxLength: 70
    Entrata:
      description: Definisce i dettagli di una entrata.
      type: object
      required:
        - ibanAccredito
        - codiceTassonomicoPagoPA
      properties:
        ibanAccredito:
          type: string
          example: IT60X0542811101000000123456
          pattern: "[a-zA-Z]{2,2}[0-9]{2,2}[a-zA-Z0-9]{1,30}"
        ibanAppoggio:
          type: string
          example: IT60X0542811101000000123456
          pattern: "[a-zA-Z]{2,2}[0-9]{2,2}[a-zA-Z0-9]{1,30}"
        codiceTassonomicoPagoPA:
          description: Tassonomia pagoPA
          type: string
          example: "9/3321"
          minLength: 1
          maxLength: 140
    EsitoRpp:
      example: ESEGUITO
      type: string
      enum:
        - IN_CORSO
        - RIFIUTATO
        - ESEGUITO
        - NON_ESEGUITO
        - ESEGUITO_PARZIALE
        - DECORRENZA
        - DECORRENZA_PARZIALE
    IdA2A:
      type: string
      pattern: '^([\w\-\.]){1,35}$'
      description: "Identificativo dell'applicativo chiamante in GovPay"
      example: "IdA2A-001"
    IdDominio:
      type: string
      pattern: '^([0-9]){11}$'
      description: "Identificativo dell'EC in pagoPA. Corrisponde al codice fiscale."
      example: "01234567890"
    IdPendenza:
      type: string
      pattern: '^([\w\-\.]){1,35}$'
      description: "Identificativo della pendenza nel gestionale proprietario"
      example: "A12345-001"
    IdTipoPendenza:
      type: string
      pattern: '^([\w\-\.]){1,35}$'
      description: "Identificativo della tipologia di pendenza"
      example: "SANZIONE-CDS"
    IdRicevuta:
      type: string
      description: "Identificativo della tipologia di pendenza"
    IdUnitaOperativa:
      type: string
      pattern: '^([\w\-\.]){1,35}$'
      description: "Identificativo dell'unita operativa"
      example: "UO-1a"
    Iuv:
      type: string
      pattern: '^([\w]){1,35}$'
      description: "Identificativo univoco di versamento"
      example: "01000000000012345"
    LinguaSecondaria:
      example: 'false'
      type: string
      enum:
        - 'false'
        - 'de'
        - 'en'
        - 'fr'
        - 'sl'
    MapEntry:
      type: object
      required:
        - key
        - value
      properties:
        key:
          type: string
          description: chiave del metadata
          minLength: 1
          maxLength: 140
        value:
          type: string
          description: valore del metadata
          minLength: 1
          maxLength: 140
    Metadata:
      type: object
      description: Metadata Custom da inserire nella ricevuta di pagamento
      properties:
        mapEntries:
          type: array
          items:
            minItems: 1
            maxItems: 5
            $ref: '#/components/schemas/MapEntry'
    ModelloPagamento:
      type: string
      description: Modello di pagamento
      example: 'Pagamento ad iniziativa PSP'
      enum:
        - 'Pagamento ad iniziativa Ente'
        - 'Pagamento ad iniziativa PSP'
    NumeroAvviso:
      type: string
      description: Identificativo univoco versamento, assegnato se pagabile da psp
      example: "301000000000012345"
      pattern: "[0-9]18"
    NuovaPendenza:
      type: object
      required:
        - idTipoPendenza
        - idDominio
        - causale
        - soggettoPagatore
        - importo
        - voci
      properties:
        idA2A:
          $ref: '#/components/schemas/IdA2A'
        idPendenza:
          $ref: '#/components/schemas/IdPendenza'
        idTipoPendenza:
          $ref: '#/components/schemas/IdTipoPendenza'
        idDominio:
          $ref: '#/components/schemas/IdDominio'
        idUnitaOperativa:
          $ref: '#/components/schemas/IdUnitaOperativa'
        causale:
          type: string
          description: Descrizione della pendenza
          example: 'Sanzione CdS n. abc00000'
          maxLength: 140
        soggettoPagatore:
          $ref: '#/components/schemas/Soggetto'
        importo:
          type: number
          description: Importo della pendenza. Deve corrispondere alla somma delle singole voci.
          example: 10.01
          minimum: 0.00
          maximum: 9999999999999999.99
        numeroAvviso:
          $ref: '#/components/schemas/NumeroAvviso'
        tassonomia:
          type: string
          description: "Macro categoria della pendenza secondo la classificazione del creditore"
          example: "Sanzioni"
          maxLength: 35
        direzione:
          type: string
          description: Identificativo della direzione interna all'ente creditore
          example: Direzione
          minLength: 1
          maxLength: 35
        divisione:
          type: string
          description: Identificativo della divisione interna all'ente creditore
          example: Divisione
          minLength: 1
          maxLength: 35
        dataValidita:
          type: string
          format: date
          description: Data di validita dei dati della pendenza, decorsa la quale la pendenza può subire variazioni.
          example: '2019-12-31'
        dataScadenza:
          type: string
          format: date
          description: Data di scadenza della pendenza, decorsa la quale non è più pagabile.
          example: '2020-12-31'
        annoRiferimento:
          type: number
          description: Anno di riferimento della pendenza
          example: 2020
          pattern: "[0-9]4"
        cartellaPagamento:
          type: string
          description: Identificativo della cartella di pagamento a cui afferisce la pendenza
          example: ABC00000001
          minLength: 1
          maxLength: 35
        datiAllegati:
          type: object
          description: Dati applicativi allegati dal gestionale secondo un formato proprietario.
        documento:
          $ref: '#/components/schemas/NuovoDocumento'
        dataNotificaAvviso:
          type: string
          format: date
          description: Data in cui inviare il promemoria di pagamento.
          example: '2020-12-31'
        dataPromemoriaScadenza:
          type: string
          format: date
          description: Data in cui inviare il promemoria di scadenza della pendenza.
          example: '2020-12-31'
        proprieta:
          $ref: '#/components/schemas/ProprietaPendenza'
        voci:
          type: array
          minItems: 1
          maxItems: 5
          items:
            $ref: '#/components/schemas/NuovaVocePendenza'
        allegati:
          type: array
          items:
            $ref: '#/components/schemas/NuovoAllegatoPendenza'
    NuovaVocePendenza:
      type: object
      allOf:
        - $ref: "#/components/schemas/TipoRiferimentoVocePendenza"
        - type: object
          required:
            - idVocePendenza
            - importo
            - descrizione
          properties:
            idDominio:
              $ref: '#/components/schemas/IdDominio'
            idVocePendenza:
              type: string
              description: Identificativo della voce di pedenza nel gestionale proprietario
              example: abcdef12345_1
              minLength: 1
              maxLength: 35
            importo:
              type: number
              description: Importo della voce
              example: 10.01
              minimum: 0.00
              maximum: 9999999999999999.99
            descrizione:
              type: string
              description: descrizione della voce di pagamento
              example: Sanzione CdS n. abc00000
              minLength: 1
              maxLength: 140
            datiAllegati:
              type: object
              description: Dati applicativi allegati dal gestionale secondo un formato proprietario.
            descrizioneCausaleRPT:
              type: string
              description: Testo libero per la causale versamento
              example: Sanzione CdS n. abc00000
              minLength: 1
              maxLength: 140
            contabilita:
                $ref: '#/components/schemas/Contabilita'
            metadata:
                $ref: '#/components/schemas/Metadata'
    NuovoAllegatoPendenza:
      type: object
      required:
        - nome
        - contenuto
      properties:
        nome:
          type: string
          description: nome del file
          minLength: 1
          maxLength: 255
        tipo:
          type: string
          description: mime type del file
          default: "application/octet-stream"
          minLength: 1
          maxLength: 255
        descrizione:
          type: string
          description: descrizione del file
          minLength: 1
          maxLength: 255
        contenuto:
          type: string
          format: byte
          description: contenuto del file
    NuovoDocumento:
      allOf:
        - $ref: "#/components/schemas/TipoRiferimentoDocumento"
        - type: object
          required:
            - identificativo
            - descrizione
          properties:
            identificativo:
              type: string
              description: Identificativo del documento
              example: abcdef12345_1
              minLength: 1
              maxLength: 35
            descrizione:
              type: string
              description: descrizione del documento
              example: Sanzione CdS n. abc00000
              minLength: 1
              maxLength: 80
    Pagina:
      type: integer
      default: 1
    Pendenza:
      type: object
      description: Dati della pendenza
      required:
        - idA2A
        - idPendenza
        - dataCaricamento
      properties:
        idA2A:
          $ref: '#/components/schemas/IdA2A'
        idPendenza:
          $ref: '#/components/schemas/IdPendenza'
        idTipoPendenza:
          $ref: '#/components/schemas/IdTipoPendenza'
        dominio:
          $ref: '#/components/schemas/Dominio'
        unitaOperativa:
          $ref: '#/components/schemas/UnitaOperativa'
        causale:
          type: string
          description: Descrizione da inserire nell'avviso di pagamento
          example: 'Sanzione CdS n. abc00000'
          maxLength: 140
        soggettoPagatore:
          $ref: '#/components/schemas/Soggetto'
        importo:
          type: number
          description: Importo della pendenza. Deve corrispondere alla somma delle singole voci.
          example: 10.01
          minimum: 0.00
          maximum: 9999999999999999.99
        numeroAvviso:
          $ref: '#/components/schemas/NumeroAvviso'
        dataValidita:
          type: string
          format: date
          description: Data di validita dei dati della pendenza, decorsa la quale la pendenza può subire variazioni.
          example: '2019-12-31'
        dataScadenza:
          type: string
          format: date
          description: Data di scadenza della pendenza, decorsa la quale non è più pagabile.
          example: '2020-12-31'
        annoRiferimento:
          type: number
          description: Anno di riferimento della pendenza
          example: 2020
        cartellaPagamento:
          type: string
          description: Identificativo della cartella di pagamento a cui afferisce la pendenza
          example: ABC00000001
        datiAllegati:
          type: object
          description: Dati applicativi allegati dal gestionale secondo un formato proprietario.
        tassonomia:
          type: string
          description: Macro categoria della pendenza secondo la classificazione del creditore
          example: Sanzioni
        direzione:
          type: string
          description: Identificativo della direzione interna all'ente creditore
          example: Direzione
          minLength: 1
          maxLength: 35
        divisione:
          type: string
          description: Identificativo della divisione interna all'ente creditore
          example: Divisione
          minLength: 1
          maxLength: 35
        documento:
          $ref: '#/components/schemas/Documento'
        UUID:
          type: string
          description: Parametro di randomizzazione delle URL di pagamento statiche
        proprieta:
          $ref: '#/components/schemas/ProprietaPendenza'
        allegati:
          type: array
          items:
            $ref: '#/components/schemas/AllegatoPendenza'
    PendenzaPagata:
      type: object
      description: Dati della pendenza con voci
      allOf:
        - $ref: '#/components/schemas/Pendenza'
        - type: object
          properties:
            voci:
              type: array
              minItems: 1
              maxItems: 5
              items:
                $ref: '#/components/schemas/VocePendenzaPagata'
    ProprietaPendenza:
      type: object
      description: Dati supporto per la gestione del ciclo di vita della pendenza.
      properties:
        linguaSecondaria:
          $ref: '#/components/schemas/LinguaSecondaria'
        descrizioneImporto:
          type: array
          items:
            $ref: '#/components/schemas/VoceDescrizioneImporto'
        lineaTestoRicevuta1:
          type: string
          description: stringa personalizzata da inserire nella ricevuta
        lineaTestoRicevuta2:
          type: string
          description: stringa personalizzata da inserire nella ricevuta
        linguaSecondariaCausale:
          type: string
          description: causale della pendenza nella lingua secondaria da inserire nell'avviso
        informativaImportoAvviso:
          type: string
          description: >-
            se valorizzato, sostituisce il testo standard. Se valorizzato con stringa vuota, l'informativa viene omessa.
          maxLength: 255
        linguaSecondariaInformativaImportoAvviso:
          type: string
          description: >-
            se valorizzato, sostituisce il testo standard. Se valorizzato con stringa vuota, l'informativa viene omessa.
          maxLength: 255
        dataScandenzaAvviso:
          type: string
          format: date
          description: se valorizzata, sostituisce la data di scadenza standard.
    QuotaContabilita:
      type: object
      required:
        - capitolo
        - annoEsercizio
        - importo
      properties:
        capitolo:
          type: string
          description: Codice del capitolo
          maxLength: 64
          example: '0101'
        annoEsercizio:
          type: number
          description: Anno di esercizio
          example: 2020
        importo:
          type: number
          description: Importo della voce di contabilita'
          example: 10.01
        accertamento:
          type: string
          description: Codice dell’accertamento
          maxLength: 64
          example: '22'
        proprietaCustom:
          type: object
          description: Dati specifici del gestionale di contabilità
        titolo:
          type: string
          description: Classificazione delle entrate in bilancio
          maxLength: 64
          example: 'titolo'
        tipologia:
          type: string
          description: Classificazione delle entrate in bilancio
          maxLength: 64
          example: 'tipologia'
        categoria:
          type: string
          description: Classificazione delle entrate in bilancio
          maxLength: 64
          example: 'categoria'
        articolo:
          type: string
          description: Classificazione delle entrate in bilancio
          maxLength: 64
          example: 'articolo'
      example:
        capitolo: '1234'
        annoEsercizio: 2020
        importo: 123.50
        accertamento: '1234'
        proprietaCustom:
          capo: 1
          riferimento: abc123
    RataDocumento:
      type: object
      required:
        - rata
      properties:
        rata:
          type: number
          description: Rata del documento
          example: 1
          minimum: 1
    Ricevuta:
      type: object
      required:
        - dominio
        - iuv
        - idRicevuta
        - importo
        - stato
        - istitutoAttestante
        - modello
        - pendenza
      properties:
        dominio:
          $ref: '#/components/schemas/Dominio'
        iuv:
          type: string
          description: Identificativo univoco di versamento
          example: RF23567483937849450550875
        idRicevuta:
          type: string
          description: Corrisponde al `receiptId` oppure al `ccp` a seconda del modello di pagamento
          example: ab12345
        importo:
          type: number
          description: Importo della transazione di pagamento.
          example: 10.01
        esito:
          $ref: "#/components/schemas/EsitoRpp"
        idPagamento:
          type: string
          description: Identificativo GovPay della sessione di pagamento
        idSessionePsp:
          type: string
          description: Identificativo pagoPA della sessione di pagamento
        istitutoAttestante:
          type: object
          description: PSP che ha gestito la transazione di pagamento ed emesso la ricevuta
          properties:
            idPSP:
              description: Identificativo del PSP assegnato da pagoPA
              type: string
            denominazione:
              description: Ragione sociale del PSP
              type: string
            idCanale:
              description: Identificativo del canale di pagamento utilizzato
              type: string
            descrizione:
              description: Descrizione del canale di pagamento utilizzato
              type: string
        versante:
          $ref: "#/components/schemas/Soggetto"
        pendenza:
          $ref: '#/components/schemas/PendenzaPagata'
        data:
          type: string
          format: date-time
          description: Data di acquisizione della ricevuta
          example: '2020-12-31'
        dataPagamento:
          type: string
          format: date-time
          description: Data di esecuzione della riscossione
          example: '2020-12-31'
        rpt:
          description: Richiesta di pagamento originale inviata a pagoPA
          type: object
          required:
            - tipo
            - xml
            - json
          properties:
            tipo:
              description: Tipo XML della richiesta
              type: string
              enum:
                - "ctRichiestaPagamentoTelematico"
                - "ctPaymentPA"
            xml:
              description: Richiesta in formato XML originale codificata in base64
              type: string
              format: byte
            json:
              description: Richiesta in formato JSON
              type: object
        rt:
          description: Ricevuta di pagamento originale emessa da pagoPA
          type: object
          properties:
            tipo:
              description: Tipo XML della ricevuta
              type: string
              enum:
                - "ctRicevutaTelematica"
                - "ctReceipt"
            xml:
              description: ricevuta in formato XML originale codificata in base64
              type: string
              format: byte
            json:
              description: ricevuta in formato JSON
              type: object
        modello:
          $ref: '#/components/schemas/ModelloPagamento'
      example:
          dominio:
            idDominio: '01234567890'
            ragioneSociale: 'Comune Dimostrativo'
          iuv: '01000000202012345'
          receiptId: '1234acdc'
          dataPagamento: '2020-12-31T12:55:12'
          attestante:
            idPSP: 'BPPONZI'
            denominazione: 'Banco Popolare Ponzi'
            idCanale: 'POS'
            descrizione: 'Pagamento con carta c/o sportello'
          versante:
            tipo: F
            identificativo: ANONIMO
            anagrafica: ANONIMO
          pendenza:
            idA2A: A2A-12345
            idPendenza: abcdef12345
            idTipoPendenza: TARI
            dominio:
              idDominio: '01234567890'
              ragioneSociale: 'Comune Dimostrativo'
            causale: 'TARI/TEFA 2021'
            soggettoPagatore:
              tipo: F
              identificativo: RSSMRA30A01H501I
              anagrafica: Mario Rossi
              indirizzo: Piazza della Vittoria
              civico: 10/A
              cap: '00000'
              localita: Roma
              provincia: Roma
              nazione: IT
              email: mario.rossi@host.eu
              cellulare: +39 000 1234567
            importo: 250.50
            numeroAvviso: '301000000202012345'
            dataScadenza: '2021-12-31'
            voci:
              - idVocePendenza: TARI
                descrizione: Importo TARI
                contabilita:
                  quote:
                    - capitolo: '0000'
                      annoEsercizio: 2020
                      importo: 210.00
                ibanAccredito: 'IT60X0542811101000000123456'
                codiceTassonomicoPagoPA: '9/0101100IM/'
                riscossione:
                  iur: 1234acdc
                  indice: 1
                  tipo: ENTRATA
                  importo: 194.00
              - dominio:
                  idDominio: '999999999999'
                  ragioneSociale: Provincia Dimostrativa
                idVocePendenza: TEFA
                descrizione: Importo TEFA
                ibanAccredito: 'IT60X0542811101000000987654'
                codiceTassonomicoPagoPA: '9/0201102IM/'
                riscossione:
                  iur: 1234acdc
                  indice: 1
                  tipo: ENTRATA_PA_NON_INTERMEDIATA
                  importo: 40.50
              - idVocePendenza: BOLLO
                descrizione: Imposta di bollo
                codiceTassonomicoPagoPA: '9/0201102IM/'
                riscossione:
                  iur: "1234acdc"
                  indice: 1
                  tipo: "MBT"
                  importo: 16.00
                  allegato:
                    tipo: "Marca da bollo"
                    testo: "[XML della Marca da bollo in base64]"
          rpt:
            data: '2020-12-31T12:53:49'
            tipo: 'ctPaymentPA'
            xml: '...[XML originale codificato Base64]...'
            json: '...[XML originale convertito in json]...'
          rt:
            data: '2020-12-31T12:55:12'
            tipo: 'ctReceipt'
            xml: '...[XML originale codificato Base64]...'
            json: '...[XML originale convertito in json]...'
          modello: 'Pagamento ad iniziativa PSP'
    RiferimentoEntrata:
      description: Definisce i dettagli di incasso tramite riferimento in anagrafica GovPay.
      type: object
      required:
        - codEntrata
      properties:
        codEntrata:
          type: string
          example: SRV-12345
          pattern: '(^[a-zA-Z0-9\-_\.]{1,35}$)'
    RiscossioneVocePagata:
      type: object
      required:
        - iuv
        - iur
        - indice
        - tipo
        - importo
        - data
      properties:
        idDominio:
          type: string
          description: Identificativo Ente Creditore
          example: 01234567890
        iuv:
          type: string
          description: Identificativo univoco di versamento
          example: RF23567483937849450550875
        iur:
          type: string
          description: Identificativo univoco di riscossione.
          example: '1234acdc'
        indice:
          type: number
          description: indice posizionale della voce pendenza riscossa
          example: 1
        tipo:
          $ref: '#/components/schemas/TipoRiscossione'
        importo:
          type: number
          description: Importo riscosso.
          example: 10.01
        data:
          type: string
          format: date-time
          description: Data di esecuzione della riscossione
        allegato:
          $ref: '#/components/schemas/Allegato'
    Soggetto:
      description: dati anagrafici di un versante o pagatore.
      type: object
      required:
        - tipo
        - identificativo
      properties:
        tipo:
          $ref: "#/components/schemas/TipoSoggetto"
        identificativo:
          description: codice fiscale o partita iva del soggetto
          type: string
          example: RSSMRA30A01H501I
          minLength: 1
          maxLength: 35
        anagrafica:
          description: nome e cognome o altra ragione sociale del soggetto
          type: string
          example: Mario Rossi
          minLength: 1
          maxLength: 70
        indirizzo:
          type: string
          example: Piazza della Vittoria
          minLength: 1
          maxLength: 70
        civico:
          type: string
          example: 10/A
          minLength: 1
          maxLength: 16
        cap:
          type: string
          example: 00000
          minLength: 1
          maxLength: 16
        localita:
          type: string
          example: Roma
          minLength: 1
          maxLength: 35
        provincia:
          type: string
          example: Roma
          minLength: 1
          maxLength: 35
        nazione:
          type: string
          example: IT
          pattern: "[A-Z]{2,2}"
        email:
          type: string
          example: mario.rossi@host.eu
          pattern: "[A-Za-z0-9_]+([\\-\\+\\.'][A-Za-z0-9_]+)*@[A-Za-z0-9_]+([\\-\\.][A-Za-z0-9_]+)*\\.[A-Za-z0-9_]+([\\-\\.][A-Za-z0-9_]+)*"
        cellulare:
          type: string
          example: +39 000 1234567
          pattern: "\\+[0-9]{2,2}\\s[0-9]{3,3}\\-[0-9]{7,7}"
    StatoFlussoRendicontazione:
      description: Stato del flusso di rendicontazione
      example: Acquisito
      type: string
      enum:
        - Acquisito
        - Anomalo
        - Rifiutato
    StatoRiscossione:
      description: Stato della riscossione
      example: RISCOSSA
      type: string
      enum:
        - RISCOSSA
        - INCASSATA
    TipoRiferimentoDocumento:
      type: object
      oneOf:
        - $ref: "#/components/schemas/RataDocumento"
        - $ref: "#/components/schemas/VincoloDocumento"
    TipoRiferimentoVocePendenza:
      type: object
      oneOf:
        - $ref: '#/components/schemas/RiferimentoEntrata'
        - $ref: '#/components/schemas/Entrata'
        - $ref: '#/components/schemas/Bollo'
    TipoRiscossione:
      description: >
        Tipologia della voce riscossa
         * ENTRATA: Entrata in tesoreria
         * MBT: Marca da bollo telematica
         * ALTRO_INTERMEDIARIO: Entrata relativa a un intermediario esterno
         * ENTRATA_PA_NON_INTERMEDIATA: Entrata relativa ad un ente creditore non intermediato da GovPay
      type: string
      enum:
        - ENTRATA
        - MBT
        - ALTRO_INTERMEDIARIO
        - ENTRATA_PA_NON_INTERMEDIATA
    TipoSoggetto:
      description: >-
        tipologia di soggetto, se persona fisica (F) o giuridica
        (G)
      type: string
      enum:
        - G
        - F
      example: F
    TipoSogliaVincoloPagamento:
      description: >-
        Indica se il pagamento deve avvenire entro o oltre la soglia di giorni indicata
      type: string
      enum:
        - ENTRO
        - OLTRE
      example: ENTRO
    UnitaOperativa:
      type: object
      required:
        - ragioneSociale
      properties:
        idUnita:
          type: string
          description: Codice fiscale
          example: 01234567890
          minLength: 1
          maxLength: 35
        ragioneSociale:
          type: string
          description: Ragione sociale
          example: Ufficio due
          minLength: 1
          maxLength: 70
    VincoloDocumento:
      type: object
      required:
        - soglia
      properties:
        soglia:
          $ref: "#/components/schemas/VincoloPagamento"
    VincoloPagamento:
      type: object
      required:
        - tipo
        - giorni
      properties:
        giorni:
          type: number
          description: numero di giorni vincolo per il pagamento
          example: 5
          minimum: 1
        tipo:
          $ref: "#/components/schemas/TipoSogliaVincoloPagamento"
    VoceDescrizioneImporto:
      type: object
      properties:
        voce:
          type: string
          description: voce importo
          example: canone annuo
        importo:
          type: number
          description: importo
          example: 10.01
    VocePendenza:
      allOf:
        - $ref: "#/components/schemas/TipoRiferimentoVocePendenza"
        - type: object
          required:
            - idVocePendenza
            - pendenza
          properties:
            dominio:
              $ref: '#/components/schemas/Dominio'
            idVocePendenza:
              type: string
              description: Identificativo della voce di pedenza nel gestionale proprietario
              example: abcdef12345_1
            descrizione:
              type: string
              description: descrizione della voce di pagamento
              example: Sanzione CdS n. abc00000
              minLength: 1
              maxLength: 140
            datiAllegati:
              type: object
              description: Dati applicativi allegati dal gestionale secondo un formato proprietario.
            descrizioneCausaleRPT:
              type: string
              description: Testo libero per la causale versamento
              example: Sanzione CdS n. abc00000
              minLength: 1
              maxLength: 140
            contabilita:
              $ref: '#/components/schemas/Contabilita'
            metadata:
              $ref: '#/components/schemas/Metadata'
            pendenza:
              $ref: '#/components/schemas/Pendenza'
    VocePendenzaPagata:
      allOf:
        - $ref: "#/components/schemas/VocePendenza"
        - type: object
          required:
            - riscossione
          properties:
            riscossione:
              $ref: "#/components/schemas/RiscossioneVocePagata"
  examples:
    PendenzaVerificata:
      summary: 'Pendenza verificata'
      value:
