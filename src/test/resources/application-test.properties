# Test Database - H2 in memory
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Logging
logging.level.root=WARN
logging.level.it.govpay=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# GovPay Stampe API Client (Mock)
govpay.stampe.base-url=http://localhost:8082/api/v1
govpay.stampe.logo.pagopa=test-logo-base64

# GovPay Pendenze API Client (Mock)
govpay.pendenze.base-url=http://localhost:8080/govpay/backend/api/pendenze/rs/basic/v2
govpay.pendenze.username=admin
govpay.pendenze.password=admin

# GDE (disabled in tests)
govpay.portal.cluster-id=test
